apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ .Chart.Name }}-ingress
  namespace: krishisetu

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:
  - host: {{ .Values.ingress.host }}

    http:
      paths:

      - path: /

        pathType: Prefix

        backend:

          service:
            name: {{ .Chart.Name }}-service

            port:
              number: {{ .Values.service.port }}
