replicaCount: 3

image: 
  repository: shashankkanade25/krishisetu
  tag: "${BUILD_NUMBER}"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: local

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 500m
    memory: 256Mi
